<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adobe CS — Keyboard Reference</title>
<style>
  :root{--v-bg:#F5F0E8;--v-panel:#EDE8DF;--v-white:#FFFFFF;--v-ink:#1A1A1A;--v-muted:#5A5A5A;--v-red:#FF3366;--v-orange:#FF9A00;--v-yellow:#FCCC0A;--v-green:#00933C;--v-blue:#31A8FF;--v-purple:#B9B8FF;--v-brown:#996633;--v-gray:#808183;--v-font:'Neue Haas Grotesk','Helvetica','Helvetica Neue','Arial',sans-serif;--v-mono:'Courier New',monospace;--bdr:1px solid #1A1A1A;--bdr-lt:1px solid #CCCCCC}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--v-font);font-size:14px;background:var(--v-bg);color:var(--v-ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  /* stripe */
  .stripe{display:flex;height:10px;position:sticky;top:0;z-index:200}
  .stripe span{flex:1}
  /* header */
  header{position:sticky;top:10px;z-index:100;background:var(--v-bg);border-bottom:2px solid var(--v-ink);padding:10px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .logo{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:-.3px;white-space:nowrap}
  .logo em{font-style:normal;font-weight:400;color:var(--v-muted);text-transform:none;font-size:12px;margin-left:6px}
  /* tabs */
  .tabs{display:flex}
  .tab{padding:6px 14px;border:1.5px solid var(--v-ink);border-right-width:0;background:transparent;color:var(--v-muted);font-family:var(--v-font);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .1s,color .1s}
  .tab:last-child{border-right-width:1.5px}
  .tab:hover{background:var(--v-ink);color:#fff}
  .tab.on[data-a="all"]{background:var(--v-ink);color:#fff}
  .tab.on[data-a="ps"]{background:var(--v-blue);color:#fff;border-color:var(--v-blue)}
  .tab.on[data-a="ai"]{background:var(--v-orange);color:#fff;border-color:var(--v-orange)}
  .tab.on[data-a="id"]{background:var(--v-red);color:#fff;border-color:var(--v-red)}
  .tab.on[data-a="pr"]{background:var(--v-purple);color:#fff;border-color:var(--v-purple)}
  /* search */
  .srch{margin-left:auto;position:relative}
  .srch input{background:var(--v-white);border:1.5px solid var(--v-ink);color:var(--v-ink);font-family:var(--v-font);font-size:13px;padding:6px 12px 6px 30px;width:240px;outline:none;transition:border-color .1s}
  .srch input:focus{border-color:var(--v-blue);box-shadow:0 0 0 3px rgba(49,168,255,.16)}
  .srch input::placeholder{color:#aaa}
  .srch-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--v-muted);pointer-events:none}
  /* layout */
  .wrap{display:flex}
  /* sidebar */
  .sb{width:196px;min-width:196px;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto;border-right:2px solid var(--v-ink);background:var(--v-panel);scrollbar-width:thin;scrollbar-color:#ccc transparent}
  .sb-app{border-bottom:var(--bdr-lt)}
  .sb-name{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:8px 12px 5px;color:#fff;display:block}
  .sb-name.ps{background:var(--v-blue)}.sb-name.ai{background:var(--v-orange)}.sb-name.id{background:var(--v-red)}.sb-name.pr{background:var(--v-purple)}
  .sb-link{display:block;padding:4px 12px;color:var(--v-muted);text-decoration:none;font-size:12px;border-left:3px solid transparent;transition:all .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sb-link:hover{color:var(--v-ink);background:rgba(0,0,0,.05)}
  .sb-link.on-ps{color:var(--v-blue);border-left-color:var(--v-blue);background:rgba(49,168,255,.10);font-weight:700}
  .sb-link.on-ai{color:var(--v-orange);border-left-color:var(--v-orange);background:rgba(255,154,0,.12);font-weight:700}
  .sb-link.on-id{color:var(--v-red);border-left-color:var(--v-red);background:rgba(255,51,102,.10);font-weight:700}
  .sb-link.on-pr{color:var(--v-purple);border-left-color:var(--v-purple);background:rgba(185,184,255,.12);font-weight:700}
  /* main */
  .main{flex:1;padding:28px 32px;overflow-x:hidden}
  .app-sec{margin-bottom:48px}
  .app-head{display:flex;align-items:stretch;margin-bottom:20px}
  .app-bar{width:8px;flex-shrink:0;margin-right:14px}
  .app-bar.ps{background:var(--v-blue)}.app-bar.ai{background:var(--v-orange)}.app-bar.id{background:var(--v-red)}.app-bar.pr{background:var(--v-purple)}
  .app-ttl-block{border-bottom:2px solid var(--v-ink);padding-bottom:8px;flex:1}
  .app-ttl{font-size:26px;font-weight:700;text-transform:uppercase;letter-spacing:-.5px;line-height:1;display:flex;align-items:baseline;gap:12px}
  .app-ver{font-size:10px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:var(--v-muted)}
  /* category */
  .cat{margin-bottom:24px;scroll-margin-top:72px}
  .cat-ttl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--v-muted);padding:5px 10px;background:var(--v-panel);border:var(--bdr);border-bottom:var(--bdr-lt)}
  .cat-empty{padding:10px;border:var(--bdr);border-top:none;background:var(--v-white);color:var(--v-muted);font-size:12px}
  .wf-ctrls{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
  .wf-btn{background:var(--v-white);border:1.5px solid var(--v-ink);color:var(--v-ink);font-family:var(--v-font);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;cursor:pointer}
  .wf-btn:hover{background:var(--v-ink);color:#fff}
  .wf-btn.on{background:var(--v-green);border-color:var(--v-green);color:#fff}
  .mode-badge{display:inline-flex;align-items:center;padding:4px 8px;border:1.5px solid var(--v-ink);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .mode-badge.locked{background:#f4d8d6;border-color:var(--v-red);color:#7c1a13}
  .mode-badge.unlocked{background:#d9f1df;border-color:var(--v-green);color:#0f5a2b}
  .wf-actions{display:flex;gap:6px;align-items:center;margin-left:8px;flex-wrap:wrap}
  .wf-meta{display:block;font-size:10px;color:var(--v-muted);margin-top:2px}
  .wf-row-main{display:block}
  .wf-row{display:block}
  .wf-row-main{flex:1;min-width:0}
  .wf-row-acts{display:inline-flex;gap:4px;flex-wrap:wrap;margin-top:6px}
  .wf-mini{background:transparent;border:1px solid #999;color:var(--v-muted);font-family:var(--v-font);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:1px 6px;cursor:pointer}
  .wf-mini:hover{border-color:var(--v-ink);color:var(--v-ink)}
  .wf-mini.dup:hover{border-color:var(--v-blue);color:var(--v-blue)}
  .wf-steps{display:flex;flex-direction:column;align-items:stretch;gap:5px}
  .wf-step{display:flex;align-items:center;gap:6px;justify-content:flex-start;flex-wrap:wrap}
  .wf-step-idx{font-size:10px;color:var(--v-muted);min-width:16px;text-align:right}
  .wf-step-name{font-size:11px;color:var(--v-muted)}
  .wf-sum{font-size:11px;color:var(--v-muted)}
  .wf-searchbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #d0d0d0;background:#f7f4ef;flex-wrap:wrap}
  .wf-searchbar input[type="text"]{background:var(--v-white);border:1.5px solid var(--v-ink);padding:5px 8px;font-family:var(--v-font);font-size:12px;width:280px;max-width:100%}
  .wf-searchbar label{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--v-muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .wf-searchbar button{background:var(--v-white);border:1.5px solid var(--v-ink);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 7px;cursor:pointer}
  .wf-searchbar button:hover{background:var(--v-ink);color:#fff}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:500;padding:18px}
  .modal.on{display:flex}
  .modal-card{width:min(740px,100%);max-height:90vh;overflow:auto;background:var(--v-white);border:2px solid var(--v-ink);padding:14px}
  .modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:2px solid var(--v-ink);padding-bottom:8px;margin-bottom:12px}
  .modal-ttl{font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .modal-close{background:transparent;border:1.5px solid var(--v-ink);font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;cursor:pointer}
  .frm{display:flex;flex-direction:column;gap:10px}
  .frm label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--v-muted)}
  .frm input,.frm select{width:100%;padding:7px 8px;border:1.5px solid var(--v-ink);font-family:var(--v-font);font-size:13px;background:var(--v-white)}
  .steps{display:flex;flex-direction:column;gap:8px}
  .step-editor{border:1px solid #cfcfcf;padding:8px;display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end}
  .step-editor.dragging{opacity:.45}
  .step-editor .step-n{grid-column:1/2}
  .step-editor .step-c{grid-column:2/3}
  .step-editor .step-drag{grid-column:3/4}
  .step-editor .step-rm{grid-column:3/4}
  .step-drag{background:transparent;border:1px solid #999;color:var(--v-muted);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 8px;cursor:grab;margin-bottom:4px}
  .step-drag:active{cursor:grabbing}
  .step-rm{background:transparent;border:1px solid #999;color:var(--v-muted);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 8px;cursor:pointer}
  .step-rm:hover{border-color:var(--v-red);color:var(--v-red)}
  .frm-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;padding-top:4px}
  .btn2{background:var(--v-white);border:1.5px solid var(--v-ink);color:var(--v-ink);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 9px;cursor:pointer}
  .btn2:hover{background:var(--v-ink);color:#fff}
  .btn2.red{border-color:var(--v-red);color:var(--v-red)}
  .btn2.red:hover{background:var(--v-red);color:#fff}
  /* table */
  .tbl{width:100%;border-collapse:collapse;background:var(--v-white);border:var(--bdr);border-top:none}
  .tbl tr{border-bottom:var(--bdr-lt);transition:background .08s}
  .tbl tr:hover{background:var(--v-bg)}
  .tbl tr:last-child{border-bottom:none}
  .tbl td{padding:6px 10px;vertical-align:top}
  .td-name{width:42%;font-size:13px}
  .td-key{width:22%;text-align:left;white-space:nowrap}
  tr.wf-tr .td-key{text-align:left;white-space:normal}
  .td-tags{width:36%;padding-left:8px}
  .wf-col-lines{display:flex;flex-direction:column;gap:0}
  .wf-col-line{min-height:26px;display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:2px 0}
  kbd{display:inline-block;background:var(--v-panel);border:1px solid #bbb;border-bottom-width:2px;color:var(--v-ink);font-family:var(--v-mono);font-size:10.5px;font-weight:700;padding:1px 5px;margin:1px 0;white-space:nowrap;line-height:1.6}
  .ksep{font-size:10px;color:#aaa;margin:0 1px}
  /* tags */
  .tag{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:transparent;border:1.5px solid #ccc;color:var(--v-muted);margin:1px 2px 1px 0;cursor:pointer;transition:all .1s}
  .tag:hover,.tag.on{background:var(--v-ink);color:#fff;border-color:var(--v-ink)}
  /* active tag bar */
  .tagbar{display:none;align-items:center;gap:8px;padding:8px 12px;background:var(--v-ink);color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
  .tagbar.on{display:flex}
  .tagbar-x{margin-left:auto;background:transparent;border:1.5px solid #fff;color:#fff;font-family:var(--v-font);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;cursor:pointer}
  .tagbar-x:hover{background:#fff;color:var(--v-ink)}
  /* misc */
  .empty{color:var(--v-muted);font-size:13px;padding:60px 0;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
  mark{background:var(--v-yellow);color:var(--v-ink);padding:0 2px}
  footer{border-top:2px solid var(--v-ink);padding:18px 32px;display:flex;align-items:center;flex-wrap:wrap;gap:12px}
  .ft{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--v-muted)}
  .dots{display:flex;margin-left:auto}
  .dot{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:700;color:#fff;display:inline-flex;align-items:center;justify-content:center;margin-left:-4px;border:2px solid var(--v-bg)}
  .toasts{position:fixed;right:14px;bottom:14px;z-index:700;display:flex;flex-direction:column;gap:8px;max-width:360px}
  .toast{background:var(--v-ink);color:#fff;padding:8px 10px;border-left:4px solid #fff;font-size:12px}
  .toast.ok{border-left-color:var(--v-green)}
  .toast.err{border-left-color:var(--v-red)}
  .toast.info{border-left-color:var(--v-blue)}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--v-panel)}::-webkit-scrollbar-thumb{background:#bbb}
  @media(max-width:700px){.sb{display:none}.main{padding:14px}.td-tags{display:none}}
</style>
</head>
<body>
<div class="stripe">
  <span style="background:#FF3366"></span><span style="background:#FF9A00"></span>
  <span style="background:#FCCC0A"></span><span style="background:#00933C"></span>
  <span style="background:#31A8FF"></span><span style="background:#B9B8FF"></span>
  <span style="background:#996633"></span><span style="background:#808183"></span>
</div>
<header>
  <div class="logo">Adobe CS <em>Keyboard Reference — Windows</em></div>
  <span id="modeBadge" class="mode-badge locked">View Only</span>
  <div class="tabs">
    <button class="tab on" data-a="all" onclick="fApp('all',this)">All</button>
    <button class="tab" data-a="ps" onclick="fApp('ps',this)">Photoshop</button>
    <button class="tab" data-a="ai" onclick="fApp('ai',this)">Illustrator</button>
    <button class="tab" data-a="id" onclick="fApp('id',this)">InDesign</button>
    <button class="tab" data-a="pr" onclick="fApp('pr',this)">Premiere</button>
  </div>
  <div class="srch">
    <span class="srch-ico">⌕</span>
    <input type="text" id="si" placeholder="Search commands or tags…" oninput="fSearch(this.value)">
  </div>
  <div class="wf-actions">
    <button class="wf-btn" type="button" onclick="addWorkflowFromHeader()">Add Workflow</button>
    <button class="wf-btn" type="button" onclick="exportWorkflows()">Export Workflows</button>
    <button class="wf-btn" type="button" onclick="triggerImportWorkflows()">Import Workflows</button>
    <input id="wfImportFile" type="file" accept="application/json" style="display:none">
  </div>
</header>
<div class="wrap">
  <nav class="sb" id="sb"></nav>
  <div style="flex:1;display:flex;flex-direction:column">
    <div class="wf-searchbar">
      <input id="wsi" type="text" placeholder="Search workflows (name, step, hotkey, tag)">
      <label><input id="wfOnly" type="checkbox"> Workflow Only View</label>
      <button type="button" onclick="clearWorkflowSearch()">Clear Workflow Search</button>
    </div>
    <div class="tagbar" id="tagbar">
      <span id="taglabel"></span>
      <button class="tagbar-x" onclick="clrTag()">✕ Clear tag</button>
    </div>
    <main class="main" id="main"></main>
    <footer>
      <div class="ft">Adobe Creative Suite CC 2024 — Windows</div>
      <div class="dots">
        <span class="dot" style="background:#31A8FF">PS</span>
        <span class="dot" style="background:#FF9A00">AI</span>
        <span class="dot" style="background:#FF3366">ID</span>
        <span class="dot" style="background:#B9B8FF">PR</span>
      </div>
    </footer>
  </div>
</div>

<div class="modal" id="wfModal" aria-hidden="true">
  <div class="modal-card">
    <div class="modal-head">
      <div class="modal-ttl" id="wfModalTitle">Workflow Editor</div>
      <button class="modal-close" type="button" onclick="closeWFModal()">Close</button>
    </div>
    <form class="frm" id="wfForm">
      <div>
        <label for="wfApp">Software</label>
        <select id="wfApp" required>
          <option value="ps">Photoshop</option>
          <option value="ai">Illustrator</option>
          <option value="id">InDesign</option>
          <option value="pr">Premiere Pro</option>
        </select>
      </div>
      <div>
        <label for="wfName">Workflow Name</label>
        <input id="wfName" type="text" maxlength="120" required>
      </div>
      <div>
        <label for="wfTags">Tags (comma separated)</label>
        <input id="wfTags" type="text" maxlength="240" placeholder="example: export, quick, social">
      </div>
      <div>
        <label>Steps (each step gets its own command)</label>
        <div class="steps" id="wfSteps"></div>
      </div>
      <div class="frm-actions" style="justify-content:flex-start">
        <button class="btn2" type="button" onclick="addStepEditor()">Add Step</button>
        <select id="wfTemplate">
          <option value="">Insert Step Template...</option>
        </select>
        <button class="btn2" type="button" onclick="insertTemplateSteps()">Insert Template</button>
      </div>
      <div class="frm-actions">
        <button class="btn2 red" id="wfDeleteBtn" type="button" onclick="deleteWFInModal()" style="display:none;margin-right:auto">Delete Workflow</button>
        <button class="btn2" type="button" onclick="closeWFModal()">Cancel</button>
        <button class="btn2" type="submit">Save Workflow</button>
      </div>
    </form>
  </div>
</div>
<div class="toasts" id="toasts"></div>

function showToast(msg,type='info',ms=2600){
  const box=document.getElementById('toasts');
  if(!box) return;
  const el=document.createElement('div');

}

async function fetchGitHubUser(){
  if(!ghToken) return '';
  const res=await fetch('https://api.github.com/user',{headers:{Authorization:`Bearer ${ghToken}`,Accept:'application/vnd.github+json'}});
  if(!res.ok) return '';
  const data=await res.json();
  return data&&data.login?String(data.login):'';
}

function ghFileUrl(){
  return `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_WORKFLOW_FILE}`;
}

function b64EncodeUtf8(str){
  return btoa(unescape(encodeURIComponent(str)));
}

function b64DecodeUtf8(str){
  return decodeURIComponent(escape(atob(str)));
}

function mkId(){
  if(window.crypto&&crypto.randomUUID) return crypto.randomUUID();
  return `wf-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function normalizeWFStore(store){
  const out={};
  ['ps','ai','id','pr'].forEach(appId=>{
    const src=Array.isArray(store&&store[appId])?store[appId]:[];
    out[appId]=src.map(w=>({
      id:w&&w.id?String(w.id):mkId(),
      n:w&&w.n?String(w.n):'',
      steps:Array.isArray(w&&w.steps)
        ?w.steps.map(st=>({
          title:st&&st.title?String(st.title):'',
          command:st&&st.command?String(st.command):''
        })).filter(st=>st.title&&st.command)
        :((w&&w.s)?[{title:'Step 1',command:String(w.s)}]:[]),
      t:Array.isArray(w&&w.t)?w.t.map(v=>String(v)).filter(Boolean):[],
      updatedAt:w&&w.updatedAt?String(w.updatedAt):'',
      updatedBy:w&&w.updatedBy?String(w.updatedBy):''
    })).filter(w=>w.n&&w.steps.length);
  });
  return out;
}

async function loadWF(){
  const headers={Accept:'application/vnd.github+json'};
  if(ghToken) headers.Authorization=`Bearer ${ghToken}`;
  const res=await fetch(ghFileUrl(),{headers});
  if(res.status===404){
    workflowFileSha='';
    customWF=normalizeWFStore({});
    return;
  }
  if(!res.ok) throw new Error('Unable to load workflows from GitHub.');
  const data=await res.json();
  workflowFileSha=data.sha||'';
  const raw=(data.content||'').replace(/\n/g,'');
  const parsed=raw?JSON.parse(b64DecodeUtf8(raw)):{};
  customWF=normalizeWFStore(parsed);
}

async function refreshWorkflowSha(){
  const headers={Accept:'application/vnd.github+json'};
  if(ghToken) headers.Authorization=`Bearer ${ghToken}`;
  const res=await fetch(ghFileUrl(),{headers});
  if(res.status===404){workflowFileSha='';return;}
  if(!res.ok) throw new Error('Unable to refresh workflow file metadata.');
  const data=await res.json();
  workflowFileSha=data.sha||'';
}

async function ensureGitHubToken(){
  if(ghToken) return true;
  const v=prompt('Enter GitHub token (repo scope) to save workflow changes:');
  if(v===null) return false;
  ghToken=v.trim();
  if(!ghToken) return false;
  ghUser=await fetchGitHubUser();
  showToast('GitHub token accepted for this session.','ok');
  return true;
}

async function saveWF(commitMsg){
  if(!ghToken) throw new Error('Unlock editing first to provide your GitHub token.');
  showToast('Saving workflows to GitHub...','info',1400);
  const headers={
    Accept:'application/vnd.github+json',
    Authorization:`Bearer ${ghToken}`,
    'Content-Type':'application/json'
  };
  const encoded=b64EncodeUtf8(JSON.stringify(customWF,null,2));
  for(let attempt=0;attempt<2;attempt++){
    const payload={message:commitMsg,content:encoded,branch:GH_BRANCH};
    if(workflowFileSha) payload.sha=workflowFileSha;
    const res=await fetch(ghFileUrl(),{method:'PUT',headers,body:JSON.stringify(payload)});
    const data=await res.json();
    if(res.ok){
      workflowFileSha=data&&data.content&&data.content.sha?data.content.sha:workflowFileSha;
      showToast('Saved to GitHub.','ok');
      return;
    }
    const msg=(data&&data.message)?data.message:'Unable to save workflows to GitHub.';
    const conflict=(res.status===409||res.status===422)&&/sha|expected|does not match/i.test(msg);
    if(conflict&&attempt===0){
      showToast('Sync conflict detected, retrying...','info',1800);
      await refreshWorkflowSha();
      continue;
    }
    throw new Error(msg);
  }
}

function ensureWFApp(appId){
  if(!Array.isArray(customWF[appId])) customWF[appId]=[];
}

function getAppCats(app){
  ensureWFApp(app.id);
  const wfc=customWF[app.id].map(w=>[
    w.n,
    (w.steps||[]).map(st=>st.command).join(' | '),
    w.t,
    w.id,
    w.steps||[],
    w.updatedAt||'',
    w.updatedBy||''
  ]);
  return [...app.cats,{t:'Workflows',c:wfc}];
}

async function verifyPwd(){
  const v=prompt('Enter workflow admin password:');
  if(v===null) return false;
  if(v!==ADMIN_PASSWORD){alert('Incorrect password.');return false;}
  return true;
}

async function unlockWF(){
  if(wfUnlocked) return;
  if(!await verifyPwd()) return;
  if(!await ensureGitHubToken()) return;
  wfUnlocked=true;
  try{await loadWF();}catch(_){/* keep current view if reload fails */}
  updateModeBadge();
  showToast('Workflow edit unlocked.','ok');
  rerender();
}

function lockWF(){
  wfUnlocked=false;
  ghToken='';
  ghUser='';
  updateModeBadge();
  showToast('Workflow edit locked.','info');
  rerender();
}

async function addWF(appId){
  if(!wfUnlocked){alert('Click Unlock Workflow Edit first.');return;}
  openWFModal(appId,'');
}

function addWorkflowFromHeader(){
  const appId=curApp==='all'?'ps':curApp;
  addWF(appId);
}

async function editWF(appId,wfId){
  if(!wfUnlocked){alert('Click Unlock Workflow Edit first.');return;}
  ensureWFApp(appId);
  openWFModal(appId,wfId);
}

async function delWF(appId,wfId){
  if(!wfUnlocked){alert('Click Unlock Workflow Edit first.');return;}
  ensureWFApp(appId);
  const row=customWF[appId].find(w=>w.id===wfId);
  if(!row) return;
  if(!confirm(`Delete workflow "${row.n}"?`)) return;
  try{
    customWF[appId]=customWF[appId].filter(w=>w.id!==wfId);
    await saveWF(`Delete workflow in ${appId}`);
    showToast('Workflow deleted.','ok');
    rerender();
  }catch(err){
    alert(err.message);
    await loadWF();
    rerender();
  }
}

function stepEditorHtml(step={title:'',command:''}){
  const t=(step.title||'').replace(/"/g,'&quot;');
  const c=(step.command||'').replace(/"/g,'&quot;');
  return `<div class="step-editor" draggable="true"><div class="step-n"><label>Step Name</label><input class="wf-step-title" type="text" value="${t}" maxlength="120" required></div><div class="step-c"><label>Hotkey / Command</label><input class="wf-step-command" type="text" value="${c}" maxlength="140" required></div><div><button class="step-drag" type="button" title="Drag to reorder">Drag</button><button class="step-rm" type="button" onclick="removeStepEditor(this)">Remove</button></div></div>`;
}

function addStepEditor(step){
  const root=document.getElementById('wfSteps');
  root.insertAdjacentHTML('beforeend',stepEditorHtml(step||{title:'',command:''}));
  persistDraft();
}

function removeStepEditor(btn){
  const root=document.getElementById('wfSteps');
  if(root.children.length<=1) return;
  const row=btn.closest('.step-editor');
  if(row) row.remove();
  persistDraft();
}

function closeWFModal(){
  const m=document.getElementById('wfModal');
  m.classList.remove('on');
  m.setAttribute('aria-hidden','true');
}

function trapModalTab(e){
  const m=document.getElementById('wfModal');
  if(!m.classList.contains('on')||e.key!=='Tab') return;
  const f=[...m.querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')].filter(el=>!el.disabled&&el.offsetParent!==null);
  if(!f.length) return;
  const first=f[0],last=f[f.length-1];
  if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
  else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
}

function getDragAfter(root,y){
  const els=[...root.querySelectorAll('.step-editor:not(.dragging)')];
  let closest={off:Number.NEGATIVE_INFINITY,el:null};
  els.forEach(el=>{
    const box=el.getBoundingClientRect();
    const off=y-box.top-box.height/2;
    if(off<0&&off>closest.off) closest={off,el};
  });
  return closest.el;
}

function setupStepDnD(){
  const root=document.getElementById('wfSteps');
  root.addEventListener('dragstart',e=>{
    const row=e.target.closest('.step-editor');
    if(!row) return;
    wfDragEl=row;
    row.classList.add('dragging');
  });
  root.addEventListener('dragend',()=>{
    if(wfDragEl) wfDragEl.classList.remove('dragging');
    wfDragEl=null;
    persistDraft();
  });
  root.addEventListener('dragover',e=>{
    e.preventDefault();
    if(!wfDragEl) return;
    const after=getDragAfter(root,e.clientY);
    if(!after) root.appendChild(wfDragEl);
    else root.insertBefore(wfDragEl,after);
  });
}

function templateOptions(appId){
  const sel=document.getElementById('wfTemplate');
  sel.innerHTML='<option value="">Insert Step Template...</option>';
  (WF_TEMPLATES[appId]||[]).forEach((t,i)=>{
    const opt=document.createElement('option');
    opt.value=String(i);
    opt.textContent=t.name;
    sel.appendChild(opt);
  });
}

function insertTemplateSteps(){
  const appId=document.getElementById('wfApp').value;
  const idx=document.getElementById('wfTemplate').value;
  if(idx==='') return;
  const tpl=(WF_TEMPLATES[appId]||[])[Number(idx)];
  if(!tpl) return;
  tpl.steps.forEach(st=>addStepEditor(st));
  persistDraft();
}

function openWFModal(appId,wfId){
  ensureWFApp(appId);
  wfDraftAppId=appId;
  wfDraftId=wfId||'';
  const row=wfDraftId?customWF[appId].find(w=>w.id===wfDraftId):null;
  const draft=getDraft();
  const useDraft=!row&&draft&&draft.appId===appId&&Array.isArray(draft.steps)&&draft.steps.length&&confirm('Restore your unsaved workflow draft?');
  document.getElementById('wfModalTitle').textContent=row?'Edit Workflow':'Add Workflow';
  document.getElementById('wfApp').value=useDraft?draft.appId:appId;
  document.getElementById('wfName').value=row?row.n:(useDraft?draft.name:'');
  document.getElementById('wfTags').value=row?(row.t||[]).join(', '):(useDraft?draft.tags:'');
  templateOptions(document.getElementById('wfApp').value);
  const steps=document.getElementById('wfSteps');
  steps.innerHTML='';
  if(row&&Array.isArray(row.steps)&&row.steps.length) row.steps.forEach(st=>addStepEditor(st));
  else if(useDraft) draft.steps.forEach(st=>addStepEditor(st));
  else addStepEditor({title:'Step 1',command:''});
  const delBtn=document.getElementById('wfDeleteBtn');
  delBtn.style.display=row?'inline-block':'none';
  const m=document.getElementById('wfModal');
  m.classList.add('on');
  m.setAttribute('aria-hidden','false');
  document.getElementById('wfName').focus();
}

async function saveWFModal(){
  if(!wfUnlocked){alert('Unlock Workflow Edit first.');return;}
  ensureWFApp(wfDraftAppId);
  const targetAppId=document.getElementById('wfApp').value;
  ensureWFApp(targetAppId);
  const n=document.getElementById('wfName').value.trim();
  if(!n){alert('Workflow name is required.');return;}
  const tags=document.getElementById('wfTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const rows=[...document.querySelectorAll('#wfSteps .step-editor')];
  const steps=rows.map(r=>({
    title:r.querySelector('.wf-step-title').value.trim(),
    command:r.querySelector('.wf-step-command').value.trim()
  })).filter(st=>st.title&&st.command);
  if(!steps.length){alert('Add at least one step with name and command.');return;}
  const now=new Date().toISOString();
  try{
    if(wfDraftId){
      const row=customWF[wfDraftAppId].find(w=>w.id===wfDraftId);
      if(!row) throw new Error('Workflow not found.');
      row.n=n; row.t=tags; row.steps=steps;
      row.updatedAt=now;
      row.updatedBy=ghUser||'unknown';
      if(targetAppId!==wfDraftAppId){
        customWF[wfDraftAppId]=customWF[wfDraftAppId].filter(w=>w.id!==wfDraftId);
        customWF[targetAppId].push(row);
        wfDraftAppId=targetAppId;
      }
      await saveWF(`Edit workflow in ${wfDraftAppId}`);
    }else{
      customWF[targetAppId].push({id:mkId(),n,t:tags,steps,updatedAt:now,updatedBy:ghUser||'unknown'});
      await saveWF(`Add workflow in ${targetAppId}`);
      wfDraftAppId=targetAppId;
    }
    clearDraft();
    closeWFModal();
    rerender();
  }catch(err){
    alert(err.message);
    showToast('Save failed.','err');
    await loadWF();
    rerender();
  }
}

async function deleteWFInModal(){
  if(!wfDraftId) return;
  if(!confirm('Delete this workflow?')) return;
  await delWF(wfDraftAppId,wfDraftId);
  clearDraft();
  closeWFModal();
}

async function duplicateWF(appId,wfId){
  if(!wfUnlocked){alert('Click Unlock Workflow Edit first.');return;}
  ensureWFApp(appId);
  const row=customWF[appId].find(w=>w.id===wfId);
  if(!row) return;
  const copy={
    id:mkId(),
    n:`${row.n} Copy`,
    t:[...(row.t||[])],
    steps:(row.steps||[]).map(st=>({title:st.title,command:st.command})),
    updatedAt:new Date().toISOString(),
    updatedBy:ghUser||'unknown'
  };
  customWF[appId].push(copy);
  try{
    await saveWF(`Duplicate workflow in ${appId}`);
    showToast('Workflow duplicated.','ok');
    rerender();
  }catch(err){
    alert(err.message);
    await loadWF();
    rerender();
  }
}

function exportWorkflows(){
  const blob=new Blob([JSON.stringify(customWF,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='workflows.export.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('Workflow export downloaded.','ok');
}

function triggerImportWorkflows(){
  if(!wfUnlocked){alert('Unlock Workflow Edit first.');return;}
  document.getElementById('wfImportFile').click();
}

async function importWorkflowsFromFile(file){
  if(!file) return;
  const text=await file.text();
  let parsed={};
  try{parsed=JSON.parse(text);}catch(_){alert('Invalid JSON file.');return;}
  const normalized=normalizeWFStore(parsed);
  if(!confirm('Replace current workflows with imported file?')) return;
  customWF=normalized;
  try{
    await saveWF('Import workflows');
    showToast('Workflows imported.','ok');
    rerender();
  }catch(err){
    alert(err.message);
    await loadWF();
    rerender();
  }
}

function clearWorkflowSearch(){
  document.getElementById('wsi').value='';
  document.getElementById('wfOnly').checked=false;
  rerender();
}

function rerender(){
  updateModeBadge();
  buildMain(curApp,document.getElementById('si').value);
  buildSB(curApp);
}

// ── anchor id
function aid(appId,cat){return(appId+'-'+cat).replace(/[^a-z0-9]/gi,'-').toLowerCase()}

// ── format shortcut into kbd chips
function fmtKey(s){
  return s.split(' / ').map((part,pi,arr)=>{
    const keys=part.split('+');
    const html=keys.map((k,ki)=>`<kbd>${k.trim()}</kbd>${ki<keys.length-1?'<span class="ksep">+</span>':''}`).join('');
    return html+(pi<arr.length-1?`<span class="ksep"> / </span>`:'');
  }).join('');
}

function fmtWFStepNames(steps){
  if(!steps||!steps.length) return '<span class="wf-sum">No steps</span>';
  return `<div class="wf-col-lines">${steps.map((st,i)=>`<div class="wf-col-line"><span class="wf-step-idx">${i+1}.</span><span class="wf-step-name">${st.title}</span></div>`).join('')}</div>`;
}

function fmtWFStepHotkeys(steps){
  if(!steps||!steps.length) return '<span class="wf-sum">No hotkeys</span>';
  return `<div class="wf-col-lines">${steps.map(st=>`<div class="wf-col-line">${fmtKey(st.command)}</div>`).join('')}</div>`;
}

function fmtWFMeta(updatedAt,updatedBy){
  if(!updatedAt&&!updatedBy) return '';
  const d=updatedAt?new Date(updatedAt):null;
  const ts=d&&!Number.isNaN(d.getTime())?d.toLocaleString():updatedAt;
  const by=updatedBy||'unknown';
  return `<span class="wf-meta">Updated by ${by}${ts?` on ${ts}`:''}</span>`;
}

// ── render tags
function fmtTags(tags){
  if(!tags||!tags.length) return '';
  return tags.map(t=>{
    const on=curTag===t?'on':'';
    const ts=t.replace(/'/g,"\\'");
    return `<span class="tag ${on}" onclick="setTag('${ts}')">${t}</span>`;
  }).join('');
}

// ── build sidebar
function buildSB(filter){
  const sb=document.getElementById('sb');
  sb.innerHTML='';
  const apps=filter==='all'?D:D.filter(a=>a.id===filter);
  apps.forEach(app=>{
    const blk=document.createElement('div');
    blk.className='sb-app';
    const lbl=document.createElement('div');
    lbl.className=`sb-name ${app.id}`;
    lbl.textContent=app.name;
    blk.appendChild(lbl);
    getAppCats(app).forEach(cat=>{
      const a=document.createElement('a');
      a.href='#'+aid(app.id,cat.t);
      a.className='sb-link';
      a.textContent=cat.t;
      a.addEventListener('click',()=>{
        document.querySelectorAll('.sb-link').forEach(l=>l.className='sb-link');
        a.classList.add('on-'+app.id);
      });
      blk.appendChild(a);
    });
    sb.appendChild(blk);
  });
}

// ── build main
function buildMain(filter,q){
  const main=document.getElementById('main');
  main.innerHTML='';
  const apps=filter==='all'?D:D.filter(a=>a.id===filter);
  const ql=(q||'').toLowerCase().trim();
  const wq=(document.getElementById('wsi')?document.getElementById('wsi').value:'').toLowerCase().trim();
  const wfOnly=document.getElementById('wfOnly')&&document.getElementById('wfOnly').checked;
  let total=0;
  apps.forEach(app=>{
    const appDiv=document.createElement('div');
    appDiv.className='app-sec';
    appDiv.id='app-'+app.id;
    appDiv.innerHTML=`<div class="app-head"><div class="app-bar ${app.id}"></div><div class="app-ttl-block"><div class="app-ttl">${app.name}<span class="app-ver">${app.v}</span></div><div class="wf-ctrls"><button class="wf-btn ${wfUnlocked?'on':''}" onclick="${wfUnlocked?'lockWF()':'unlockWF()'}">${wfUnlocked?'Workflow Edit Unlocked':'Unlock Workflow Edit'}</button></div></div></div>`;
    let has=false;
    getAppCats(app).forEach(cat=>{
      let cmds=cat.c;
      const isWF=cat.t==='Workflows';
      if(wfOnly&&!isWF) return;
      if(curTag) cmds=cmds.filter(([n,s,tags])=>tags&&tags.some(t=>t.toLowerCase()===curTag.toLowerCase()));
      if(ql) cmds=cmds.filter(([n,s,tags])=>n.toLowerCase().includes(ql)||s.toLowerCase().includes(ql)||(tags&&tags.some(t=>t.toLowerCase().includes(ql))));
      if(isWF&&wq){
        cmds=cmds.filter(([n,s,tags,_wfId,wfSteps])=>{
          const stepTxt=(wfSteps||[]).map(st=>`${st.title} ${st.command}`).join(' ').toLowerCase();
          return n.toLowerCase().includes(wq)||s.toLowerCase().includes(wq)||(tags||[]).some(t=>t.toLowerCase().includes(wq))||stepTxt.includes(wq);
        });
      }
      if(!cmds.length&&!isWF) return;
      has=true; total+=cmds.length;
      const catDiv=document.createElement('div');
      catDiv.className='cat';
      catDiv.id=aid(app.id,cat.t);
      const titleDiv=document.createElement('div');
      titleDiv.className='cat-ttl';
      titleDiv.textContent=cat.t;
      catDiv.appendChild(titleDiv);
      if(!cmds.length&&isWF){
        const empty=document.createElement('div');
        empty.className='cat-empty';
        empty.textContent='No custom workflows yet. Use Add Workflow to create one.';
        catDiv.appendChild(empty);
        appDiv.appendChild(catDiv);
        return;
      }
      const tbl=document.createElement('table');
      tbl.className='tbl';
      cmds.forEach(([name,shortcut,tags,wfId,wfSteps,updatedAt,updatedBy])=>{
        const tr=document.createElement('tr');
        if(isWF) tr.classList.add('wf-tr');
        const n=document.createElement('td');
        n.className='td-name';
        if(isWF){
          const wrap=document.createElement('div');
          wrap.className='wf-row';
          const nm=document.createElement('span');
          nm.className='wf-row-main';
          nm.innerHTML=(ql?hlite(name,ql):name)+fmtWFMeta(updatedAt,updatedBy)+`<span class="wf-row-acts"><button class="wf-mini" onclick="editWF('${app.id}','${wfId||''}')">Edit</button><button class="wf-mini dup" onclick="duplicateWF('${app.id}','${wfId||''}')">Duplicate</button><button class="wf-mini" onclick="delWF('${app.id}','${wfId||''}')">Delete</button></span>`;
          wrap.appendChild(nm);
          n.appendChild(wrap);
        }else{
          n.innerHTML=ql?hlite(name,ql):name;
        }
        const k=document.createElement('td');
        k.className='td-key';
        k.innerHTML=isWF?fmtWFStepHotkeys(wfSteps):fmtKey(shortcut);
        const tg=document.createElement('td');
        tg.className='td-tags';
        tg.innerHTML=isWF?fmtWFStepNames(wfSteps):fmtTags(tags);
        tr.appendChild(n);tr.appendChild(k);tr.appendChild(tg);
        tbl.appendChild(tr);
      });
      catDiv.appendChild(tbl);
      appDiv.appendChild(catDiv);
    });
    if(has) main.appendChild(appDiv);
  });
  if(!total){
    const msg=curTag?`No commands tagged "${curTag}"${ql?` matching "${q}"`:''}`: `No commands found for "${q}"`;
    main.innerHTML=`<div class="empty">${msg}</div>`;
  }
}

function hlite(text,q){
  const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(`(${e})`,'gi'),'<mark>$1</mark>');
}

function fApp(id,btn){
  curApp=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  buildMain(id,document.getElementById('si').value);
  buildSB(id);
}

function setTag(tag){
  curTag=(curTag===tag)?null:tag;
  updateTagBar();
  buildMain(curApp,document.getElementById('si').value);
}

function clrTag(){
  curTag=null;
  updateTagBar();
  buildMain(curApp,document.getElementById('si').value);
}

function updateTagBar(){
  const bar=document.getElementById('tagbar');
  const lbl=document.getElementById('taglabel');
  if(curTag){bar.classList.add('on');lbl.textContent=`Tag: ${curTag}`}
  else{bar.classList.remove('on')}
}

function fSearch(v){buildMain(curApp,v)}

async function init(){
  try{
    await loadWF();
  }catch(err){
    customWF=normalizeWFStore({});
    alert('Workflows could not be loaded from GitHub right now. You can still browse shortcuts.');
  }
  updateModeBadge();
  setupStepDnD();
  document.getElementById('wfForm').addEventListener('submit',async(e)=>{
    e.preventDefault();
    await saveWFModal();
  });
  document.getElementById('wfForm').addEventListener('input',persistDraft);
  document.getElementById('wfApp').addEventListener('change',()=>{
    templateOptions(document.getElementById('wfApp').value);
    persistDraft();
  });
  document.getElementById('wsi').addEventListener('input',()=>rerender());
  document.getElementById('wfOnly').addEventListener('change',()=>rerender());
  document.getElementById('wfImportFile').addEventListener('change',async(e)=>{
    const file=e.target.files&&e.target.files[0]?e.target.files[0]:null;
    await importWorkflowsFromFile(file);
    e.target.value='';
  });
  document.addEventListener('keydown',async(e)=>{
    const m=document.getElementById('wfModal');
    if(!m.classList.contains('on')) return;
    if(e.key==='Escape'){e.preventDefault();closeWFModal();return;}
    trapModalTab(e);
  });
  buildMain('all','');
  buildSB('all');
}

init();
</script>
